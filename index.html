<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="Drop cute animal plushies, merge matching animals, and grow the biggest animal you can.">
  <meta name="theme-color" content="#ead995">
  <meta property="og:title" content="Animal Merge Game">
  <meta property="og:description" content="A browser-playable animal merging game with soft plush toy pieces.">
  <title>Animal Merge Game</title>
  <link rel="stylesheet" href="styles.css?v=20260424-2">
</head>
<body>
  <main class="app-shell">
    <section class="stage-screen" aria-label="Animal Merge Game" data-i18n-aria="appLabel">
      <div class="language-switch" role="group" aria-label="Language">
        <button class="language-switch__button" type="button" data-lang-option="ja">JP</button>
        <button class="language-switch__button" type="button" data-lang-option="en">EN</button>
      </div>

      <div class="score-bubble">
        <span class="hud-title" data-i18n="score">Score</span>
        <strong id="scoreValue" class="score-value">0</strong>
        <span class="best-score">Best Score 0</span>
      </div>

      <aside class="ranking-card" aria-label="Score ranking" data-i18n-aria="rankingLabel">
        <div class="ranking-card__header">
          <span>L</span>
          <strong data-i18n="ranking">Animal Ranking</strong>
          <span>R</span>
        </div>
        <form id="playerForm" class="ranking-card__profile">
          <input id="playerNameInput" type="text" maxlength="12" autocomplete="nickname" aria-label="Player name" data-i18n-aria="playerName">
          <button class="button" type="submit" data-i18n="setName">Set</button>
        </form>
        <ol id="leaderboardList">
          <li><span>1</span><em>-----</em><strong>0</strong></li>
          <li><span>2</span><em>-----</em><strong>0</strong></li>
          <li><span>3</span><em>-----</em><strong>0</strong></li>
        </ol>
        <div class="ranking-card__now">
          <span data-i18n="now">Now</span>
          <strong id="rankingScoreValue">0</strong>
        </div>
        <div class="ranking-card__rank">
          <span data-i18n="myRank">My Rank</span>
          <strong id="playerRankValue">--</strong>
        </div>
      </aside>

      <div class="game-column">
        <div class="mascot-cloud">drop</div>
        <div id="comboBadge" class="combo-badge combo-badge--hidden" aria-live="polite"></div>
        <div class="game-wrap">
          <canvas
            id="gameCanvas"
            width="480"
            height="620"
            aria-label="Animal Merge Game field"
            data-i18n-aria="gameField"
          ></canvas>

          <div id="overlay" class="overlay overlay--hidden" aria-live="polite">
            <div class="overlay__card">
              <p class="overlay__eyebrow" data-i18n="roundOver">Round Over</p>
              <h2 data-i18n="gameOver">Game Over</h2>
              <p data-i18n="gameOverCopy">Your stack stayed above the limit line for too long.</p>
              <div class="overlay__stats">
                <div class="overlay__stat">
                  <span data-i18n="finalScore">Final Score</span>
                  <strong id="overlayScoreValue">0</strong>
                </div>
                <div class="overlay__stat">
                  <span data-i18n="bestScore">Best Score</span>
                  <strong id="overlayBestValue">0</strong>
                </div>
                <div class="overlay__stat">
                  <span data-i18n="topAnimal">Top Animal</span>
                  <strong id="overlayHighestValue">Rabbit</strong>
                </div>
              </div>
              <button id="overlayRestartButton" class="button" type="button" data-i18n="playAgain">Play Again</button>
            </div>
          </div>
        </div>
      </div>

      <aside class="next-bubble">
        <span class="hud-title" data-i18n="next">Next</span>
        <canvas id="nextCanvas" width="110" height="110" aria-label="Next piece preview" data-i18n-aria="nextPreview"></canvas>
        <div class="next-bubble__queue">
          <span class="next-bubble__queue-label" data-i18n="afterNext">After</span>
          <canvas id="queueCanvas" width="72" height="72" aria-label="After next piece preview" data-i18n-aria="afterNextPreview"></canvas>
        </div>
      </aside>

      <aside class="evolution-card">
        <strong data-i18n="animalRing">Animal Ring</strong>
        <canvas id="evolutionCanvas" width="170" height="170" aria-label="Piece evolution ring" data-i18n-aria="evolutionRing"></canvas>
        <div class="evolution-card__status">
          <div class="evolution-card__chip">
            <span data-i18n="highest">Highest</span>
            <strong id="highestAnimalValue">Rabbit</strong>
          </div>
          <div class="evolution-card__chip">
            <span data-i18n="progress">Progress</span>
            <strong id="progressValue">1 / 11</strong>
          </div>
        </div>
      </aside>

      <div class="control-strip">
        <span data-i18n="move">Move</span>
        <span data-i18n="drop">Drop</span>
        <button id="restartButton" class="button" type="button" data-i18n="restart">Restart</button>
      </div>
    </section>
  </main>

  <script src="app.js?v=20260424-2"></script>
</body>
</html>
